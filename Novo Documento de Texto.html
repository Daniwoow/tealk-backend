<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tealk</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 600px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 70%;
            border: none;
            border-radius: 8px;
            margin-right: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: #ffffff;
            color: #333;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #ddd;
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Tealk</h1>
        <p>Sua rede social está chegando...</p>

        <div>
            <input type="email" placeholder="Digite seu email">
            <button>Quero participar</button>
        </div>

        <div class="footer">
            Conectando pessoas, criando conversas 💬
        </div>
    </div>
</body>
</html>
