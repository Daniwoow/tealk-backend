<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tealk | Conexões Reais</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILO GERAL DA PÁGINA (Baseado na versão anterior) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Cores calmas e fundo neutro para focar no conteúdo */
            font-family: 'Lexend', sans-serif;
            background-color: #f8f9fa; /* Um cinza/branco muito suave */
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            /* O "Card" acolhedor */
            max-width: 600px;
            background: white;
            padding: 60px 40px;
            border-radius: 32px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* --- O NOVO LOGO: OPÇÃO 3 (Tech & Dinâmico) --- */
        .logo {
            font-family: 'Lexend', sans-serif; /* Mesma fonte, mas com peso 800 */
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 25px;
            letter-spacing: -2px; /* Letras mais próximas para um visual moderno */
            
            /* Efeito de Gradiente no Texto */
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 50%, #fab1a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            
            /* Um leve brilho para dar profundidade */
            filter: drop-shadow(0px 4px 8px rgba(79, 172, 254, 0.25));
            
            display: inline-block; /* Necessário para o gradiente funcionar bem */
        }

        /* --- RESTO DA LANDING PAGE (Baseado na versão anterior) --- */
        h1 {
            color: #2d3436;
            font-size: 32px;
            line-height: 1.2;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .description {
            font-size: 18px;
            color: #636e72;
            margin-bottom: 40px;
            line-height: 1.6;
            font-weight: 300;
        }

        .form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input {
            padding: 18px;
            border-radius: 16px;
            border: 2px solid #eee;
            font-size: 16px;
            background: #fdfdfd;
            transition: 0.3s;
            outline: none;
            font-family: 'Lexend', sans-serif;
            font-weight: 300;
        }

        input:focus {
            border-color: #4facfe; /* Cor de foco combinando com o início do gradiente */
        }

        button {
            padding: 18px;
            border-radius: 16px;
            border: none;
            background: #2d3436; /* Botão escuro para contraste */
            color: white;
            font-weight: 500;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
            font-family: 'Lexend', sans-serif;
        }

        button:hover {
            background: #000;
            transform: translateY(-2px); /* Efeito suave de elevação */
        }

        .footer {
            margin-top: 40px;
            font-size: 14px;
            color: #b2bec3;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Responsividade para telas pequenas */
        @media (max-width: 480px) {
            .container {
                padding: 40px 20px;
            }
            .logo { font-size: 44px; }
            h1 { font-size: 26px; }
            .description { font-size: 16px; }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">Tealk</div>

        <h1>Um lugar onde a conversa flui no seu tempo.</h1>

        <p class="description">
            Criando uma rede social acolhedora para mentes neurodivergentes fortalecerem laços e habilidades de comunicação.
        </p>

        <div class="form">
            <input type="email" placeholder="Seu melhor e-mail...">
            <button>Quero saber quando lançar</button>
        </div>

        <div class="footer">
            Em construção com carinho 🌿
        </div>
    </div>
</body>
</html>
