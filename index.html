<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tealk | Landing Page</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Lexend:wght@300;500;800&family=Patrick+Hand&display=swap" rel="stylesheet">

    <style>
        /* --- ESTILO GERAL DA PÁGINA --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f0f4f0; /* Um verde sálvia bem clarinho e calmo */
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: white;
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
        }

        /* --- ESTILOS DOS LOGOS (O QUE VOCÊ ME PEDIU) --- */
        .logo-display {
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-bottom: 1px solid #eee;
            padding-bottom: 30px;
        }

        .temp-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b2bec3;
        }

        /* Opção 1: Bolha (Orgânico) */
        .logo-bubble {
            font-family: 'Fredoka', sans-serif;
            font-size: 54px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            gap: 2px;
        }
        .logo-bubble span:nth-child(odd) { color: #4facfe; transform: translateY(-3px); }
        .logo-bubble span:nth-child(even) { color: #55efc4; transform: translateY(2px); }

        /* Opção 2: Escrito à mão */
        .logo-hand {
            font-family: 'Patrick Hand', cursive;
            font-size: 60px;
            color: #2d3436;
            text-decoration: underline dotted #fab1a0;
        }

        /* Opção 3: Moderno Dinâmico */
        .logo-modern {
            font-family: 'Lexend', sans-serif;
            font-size: 50px;
            font-weight: 800;
            background: linear-gradient(135deg, #4facfe, #fab1a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- RESTO DA LANDING PAGE --- */
        h1 { font-size: 28px; margin-bottom: 15px; color: #2d3436; }
        .description { font-size: 18px; color: #636e72; margin-bottom: 35px; line-height: 1.6; }
        
        .form { display: flex; flex-direction: column; gap: 12px; }
        input { padding: 18px; border-radius: 15px; border: 2px solid #f1f1f1; font-size: 16px; outline: none; }
        input:focus { border-color: #4facfe; }
        
        button { 
            padding: 18px; border-radius: 15px; border: none; 
            background: #2d3436; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.3s; 
        }
        button:hover { background: #000; transform: scale(1.02); }
    </style>
</head>

<body>
    <div class="container">
        
        <div class="logo-display">
            <div>
                <p class="temp-label">Opção 1: Amigável</p>
                <div class="logo-bubble"><span>T</span><span>e</span><span>a</span><span>l</span><span>k</span></div>
            </div>
            <div>
                <p class="temp-label">Opção 2: Humano</p>
                <div class="logo-hand">Tealk</div>
            </div>
            <div>
                <p class="temp-label">Opção 3: Tech Dinâmico</p>
                <div class="logo-modern">Tealk</div>
            </div>
        </div>

        <h1>Um lugar para conversas reais.</h1>
        <p class="description">
            Uma rede social pensada para o conforto de pessoas neurodivergentes, focada em conexões genuínas.
        </p>

        <div class="form">
            <input type="email" placeholder="Seu e-mail para a lista de espera">
            <button>Quero fazer parte</button>
        </div>

    </div>
</body>
</html>
