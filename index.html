<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tealk | Conexões Reais</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        /* --- ANIMAÇÕES (O segredo do movimento suave) --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0; /* Começa invisível para a animação funcionar */
        }

        /* Delay para cada elemento aparecer um pouco depois do outro (efeito cascata) */
        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }
        .delay-4 { animation-delay: 0.8s; }

        /* --- ESTILOS QUE VOCÊ JÁ TINHA --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f3f0ff; 
            color: #2d3436;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            background: white;
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(108, 92, 231, 0.1);
            text-align: center;
        }

        .logo {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 50%, #fab1a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .tagline {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a29bfe;
            font-weight: 500;
            margin-bottom: 30px;
        }

        h1 { font-size: 28px; line-height: 1.3; margin-bottom: 30px; color: #2d3436; }

        .features { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }

        .feature-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            font-size: 16px;
            color: #636e72;
            border: 1px solid #f1f1f1;
            transition: 0.3s;
        }

        .feature-item:hover {
            transform: scale(1.02);
            border-color: #a29bfe;
            background: #fff;
        }

        .form { display: flex; flex-direction: column; gap: 12px; }

        input {
            padding: 18px;
            border-radius: 20px;
            border: 2px solid #eee;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
            text-align: center;
        }

        input:focus { border-color: #6c5ce7; }

        button {
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: #6c5ce7;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5849d1;
            box-shadow: 0 8px 15px rgba(108, 92, 231, 0.3);
        }

        .footer { margin-top: 30px; font-size: 13px; color: #b2bec3; }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo animate delay-1">Tealk</div>
        <p class="tagline animate delay-1">Rede Social Acolhedora</p>

        <h1 class="animate delay-2">Conecte-se de um jeito que faz sentido para você.</h1>

        <div class="features animate delay-3">
            <div class="feature-item">🤝 Amizades baseadas em interesses reais</div>
            <div class="feature-item">☁️ Ambiente livre de pressões sociais</div>
            <div class="feature-item">💬 Comunicação no seu próprio ritmo</div>
        </div>

        <div class="form animate delay-4">
            <input type="email" placeholder="Digite seu melhor e-mail">
            <button>Entrar na lista de espera</button>
        </div>

        <p class="footer animate delay-4">Privacidade respeitada. Em breve disponível. ✨</p>
    </div>
</body>
</html>
